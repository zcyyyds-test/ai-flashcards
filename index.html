<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 技术面试卡片</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e0e0e0; min-height: 100vh; }

  /* ── Header ── */
  header { background: #1a1a24; border-bottom: 1px solid #2a2a3a; padding: 12px 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 1.1rem; font-weight: 700; color: #fff; white-space: nowrap; }
  .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; font-size: 0.78rem; }
  .stat-chip { background: #252535; border-radius: 20px; padding: 4px 12px; color: #aaa; }
  .stat-chip span { color: #7eb8f7; font-weight: 600; }
  .overall-progress { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 0.78rem; color: #aaa; }
  .prog-bar { width: 100px; height: 6px; background: #2a2a3a; border-radius: 3px; overflow: hidden; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); border-radius: 3px; transition: width 0.4s; }

  /* ── Search ── */
  .search-bar { background: #151520; border-bottom: 1px solid #222; padding: 8px 12px; display: flex; gap: 8px; align-items: center; }
  .search-bar input { flex: 1; background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 8px; color: #e0e0e0; padding: 6px 14px; font-size: 0.82rem; outline: none; }
  .search-bar input:focus { border-color: #5a7ec9; }
  .search-bar input::placeholder { color: #555; }
  .toolbar-btn { background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 6px; color: #bbb; padding: 5px 12px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .toolbar-btn:hover { border-color: #5a7ec9; color: #fff; }

  /* ── Category nav ── */
  nav { background: #151520; border-bottom: 1px solid #222; display: flex; gap: 4px; padding: 8px 12px; overflow-x: auto; white-space: nowrap; scrollbar-width: thin; }
  nav::-webkit-scrollbar { height: 4px; }
  nav::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  .cat-btn { background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 8px; color: #bbb; padding: 5px 14px; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .cat-btn:hover { border-color: #5a7ec9; color: #fff; }
  .cat-btn.active { background: #2a3a6a; border-color: #5a7ec9; color: #7eb8f7; font-weight: 600; }
  .cat-btn .badge { background: #333; border-radius: 10px; padding: 1px 6px; font-size: 0.7rem; margin-left: 4px; color: #888; }
  .cat-btn.active .badge { background: #1e2d5a; color: #7eb8f7; }

  /* ── Mode controls ── */
  .controls { background: #13131e; padding: 8px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid #1e1e2e; }
  .mode-btn { background: #1e1e2e; border: 1px solid #2a2a3a; border-radius: 6px; color: #bbb; padding: 4px 12px; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
  .mode-btn:hover { border-color: #5a7ec9; color: #fff; }
  .mode-btn.active { background: #1e2d4a; border-color: #4a6ec9; color: #7eb8f7; }
  .sep { color: #333; }
  .shortcut-hint { font-size: 0.7rem; color: #555; margin-left: auto; }
  kbd { background: #222; border: 1px solid #444; border-radius: 3px; padding: 1px 5px; font-family: monospace; font-size: 0.68rem; }

  /* ── Card area ── */
  main { display: flex; flex-direction: column; align-items: center; padding: 24px 16px; min-height: calc(100vh - 200px); }
  .card-counter { font-size: 0.78rem; color: #555; margin-bottom: 12px; }
  .card-counter span { color: #888; }

  /* ── Flashcard ── */
  .card-wrap { perspective: 1200px; width: 100%; max-width: 720px; height: 380px; cursor: pointer; user-select: none; }
  .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 16px; padding: 28px 32px; display: flex; flex-direction: column; }
  .card-front { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); border: 1px solid #2a3a5a; }
  .card-back { background: linear-gradient(135deg, #0e1a12 0%, #0f1f1a 100%); border: 1px solid #2a4a3a; transform: rotateY(180deg); overflow-y: auto; }
  .card-face::-webkit-scrollbar { width: 4px; }
  .card-face::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .card-cat-tag { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 10px; display: inline-block; margin-bottom: 16px; align-self: flex-start; }
  .card-front .card-cat-tag { background: #1e2d4a; color: #5a8ec9; }
  .card-back .card-cat-tag { background: #1a3020; color: #4a9a6a; }

  .card-q { font-size: 1.25rem; font-weight: 600; color: #fff; line-height: 1.5; flex: 1; display: flex; align-items: center; }
  .card-flip-hint { font-size: 0.72rem; color: #444; margin-top: 16px; text-align: center; }

  .card-back .answer-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #4a9a6a; margin-bottom: 12px; }
  .card-back ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
  .card-back li { display: flex; gap: 8px; font-size: 0.88rem; line-height: 1.55; color: #d0e8d8; }
  .card-back li::before { content: '▸'; color: #4a9a6a; flex-shrink: 0; margin-top: 2px; font-size: 0.8rem; }
  .card-back .highlight { color: #7ed8a8; font-weight: 600; }
  .card-back .num { color: #f0c060; font-weight: 700; font-family: monospace; }

  /* ── Action buttons ── */
  .card-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
  .action-btn { border: none; border-radius: 10px; padding: 10px 18px; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 72px; }
  .action-btn .interval { font-size: 0.65rem; font-weight: 400; opacity: 0.7; }
  .btn-again { background: #4a1d1d; color: #ea7a7a; border: 1px solid #6a2a2a; }
  .btn-again:hover { background: #6a2a2a; color: #ff9a9a; }
  .btn-hard { background: #3a2a10; color: #e0a040; border: 1px solid #5a4a2a; }
  .btn-hard:hover { background: #5a4a2a; color: #f0c060; }
  .btn-good { background: #1d4a2a; color: #5dca7a; border: 1px solid #2a6a3a; }
  .btn-good:hover { background: #2a6a3a; color: #7aea9a; }
  .btn-easy { background: #1e2d4a; color: #7eb8f7; border: 1px solid #2a4a7a; }
  .btn-easy:hover { background: #2a4a7a; color: #aad4ff; }
  .btn-next { background: #1e2d4a; color: #7eb8f7; border: 1px solid #2a4a7a; }
  .btn-next:hover { background: #2a4a7a; color: #aad4ff; }
  .card-actions.need-flip { display: none; }
  .rate-hint { font-size: 0.72rem; color: #555; margin-top: 8px; text-align: center; display: none; }
  .rate-hint.show { display: block; }

  /* ── No cards message ── */
  .no-cards { text-align: center; color: #555; padding: 60px 20px; }
  .no-cards h2 { font-size: 1.1rem; color: #777; margin-bottom: 8px; }

  /* ── Category progress panel ── */
  .cat-progress { width: 100%; max-width: 720px; margin-top: 20px; }
  .cat-progress-title { font-size: 0.72rem; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em; }
  .cat-rows { display: flex; flex-direction: column; gap: 6px; }
  .cat-row { display: flex; align-items: center; gap: 10px; font-size: 0.75rem; }
  .cat-row-name { width: 120px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-row-bar { flex: 1; height: 5px; background: #1e1e2e; border-radius: 3px; overflow: hidden; }
  .cat-row-fill { height: 100%; background: #4a9a6a; border-radius: 3px; transition: width 0.4s; }
  .cat-row-pct { width: 36px; text-align: right; color: #666; }

  /* ── Mastered overlay ── */
  .mastered-badge { display: none; position: absolute; top: 16px; right: 16px; background: #1d4a2a; border: 1px solid #4a9a6a; border-radius: 20px; padding: 3px 10px; font-size: 0.68rem; color: #6adf9a; font-weight: 700; }
  .is-known .mastered-badge { display: block; }

  /* ── Modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: #1a1a24; border: 1px solid #2a2a3a; border-radius: 16px; padding: 28px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 1rem; color: #fff; margin-bottom: 16px; }
  .modal label { display: block; font-size: 0.78rem; color: #aaa; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal select, .modal textarea { width: 100%; background: #252535; border: 1px solid #2a2a3a; border-radius: 8px; color: #e0e0e0; padding: 8px 12px; font-size: 0.85rem; outline: none; font-family: inherit; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: #5a7ec9; }
  .modal textarea { min-height: 120px; resize: vertical; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .modal-actions button { padding: 8px 20px; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; }
  .modal-actions .btn-save { background: #2a5a3a; color: #7aea9a; }
  .modal-actions .btn-save:hover { background: #3a7a4a; }
  .modal-actions .btn-cancel { background: #333; color: #aaa; }
  .modal-actions .btn-cancel:hover { background: #444; color: #fff; }

  /* ── Custom card indicator ── */
  .custom-badge { position: absolute; top: 16px; left: 16px; background: #3a2a1a; border: 1px solid #6a5a3a; border-radius: 20px; padding: 2px 8px; font-size: 0.6rem; color: #d0a050; font-weight: 600; }

  /* ── Code blocks ── */
  .card-back code { background: #151525; padding: 2px 6px; border-radius: 3px; font-family: 'Consolas','Monaco','Courier New',monospace; font-size: 0.8rem; color: #a0d0f0; }
  .card-back pre { background: #0a0a18; border: 1px solid #252540; border-radius: 8px; padding: 12px 14px; margin: 6px 0 2px 0; overflow-x: auto; font-family: 'Consolas','Monaco','Courier New',monospace; font-size: 0.76rem; line-height: 1.55; color: #b8d8b8; white-space: pre; }
  .card-back pre .kw { color: #c586c0; }
  .card-back pre .fn { color: #dcdcaa; }
  .card-back pre .str { color: #ce9178; }
  .card-back pre .cm { color: #6a9955; }
  .card-back pre .num { color: #b5cea8; font-weight: normal; font-family: inherit; }

  /* ── Difficulty badge ── */
  .diff-badge { display: inline-block; font-size: 0.62rem; padding: 2px 8px; border-radius: 10px; margin-left: 8px; font-weight: 700; vertical-align: middle; }
  .diff-1 { background: #1a3020; color: #6adf9a; }
  .diff-2 { background: #2a2a10; color: #e0c050; }
  .diff-3 { background: #3a1a1a; color: #ea7a7a; }

  /* ── Daily practice banner ── */
  .daily-banner { background: linear-gradient(90deg, #1a2a3a, #1a1a2e); border: 1px solid #2a4a6a; border-radius: 10px; padding: 12px 20px; margin-bottom: 16px; width: 100%; max-width: 720px; display: none; }
  .daily-banner.show { display: block; }
  .daily-banner h3 { font-size: 0.85rem; color: #7eb8f7; margin-bottom: 6px; }
  .daily-banner p { font-size: 0.75rem; color: #888; }
  .daily-banner .daily-stats { display: flex; gap: 12px; margin-top: 6px; font-size: 0.72rem; }
  .daily-banner .ds { color: #aaa; }
  .daily-banner .ds span { font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>AI 技术面试卡片</h1>
  <div class="stats-bar">
    <div class="stat-chip">总计 <span id="total-count">0</span> 张</div>
    <div class="stat-chip" style="color:#ea7a7a">待复习 <span id="due-count" style="color:#ea7a7a">0</span></div>
    <div class="stat-chip">学习中 <span id="learning-count">0</span></div>
    <div class="stat-chip">已掌握 <span id="known-count">0</span> 张</div>
    <div class="stat-chip">新卡 <span id="new-count">0</span></div>
  </div>
  <div class="overall-progress">
    <span id="overall-pct">0%</span>
    <div class="prog-bar"><div class="prog-fill" id="overall-fill" style="width:0%"></div></div>
  </div>
</header>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="搜索卡片 (问题或答案)..." oninput="onSearch()">
  <button class="toolbar-btn" onclick="openAddModal()">+ 添加卡片</button>
  <button class="toolbar-btn" onclick="exportCards()">导出</button>
  <button class="toolbar-btn" onclick="document.getElementById('import-file').click()">导入</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importCards(event)">
</div>

<nav id="cat-nav"></nav>

<div class="controls">
  <button class="mode-btn active" id="mode-all" onclick="setMode('all')">全部</button>
  <button class="mode-btn" id="mode-unknown" onclick="setMode('unknown')">待复习</button>
  <button class="mode-btn" id="mode-unmarked" onclick="setMode('unmarked')">新卡片</button>
  <button class="mode-btn" id="mode-shuffle" onclick="toggleShuffle()">随机</button>
  <span class="sep">|</span>
  <button class="mode-btn" id="diff-1" onclick="toggleDiff(1)">★ 初级</button>
  <button class="mode-btn" id="diff-2" onclick="toggleDiff(2)">★★ 中级</button>
  <button class="mode-btn" id="diff-3" onclick="toggleDiff(3)">★★★ 高级</button>
  <span class="sep">|</span>
  <button class="mode-btn" id="mode-review" onclick="startReviewSession()" style="color:#7eb8f7">开始复习</button>
  <button class="mode-btn" onclick="resetProgress()">重置进度</button>
  <span class="shortcut-hint"><kbd>空格</kbd> 翻转 &nbsp; <kbd>←</kbd><kbd>→</kbd> 切换 &nbsp; <kbd>1</kbd>重来 <kbd>2</kbd>困难 <kbd>3</kbd>良好 <kbd>4</kbd>简单</span>
</div>

<main>
  <div class="daily-banner" id="review-banner">
    <h3 id="review-title">复习模式</h3>
    <p>FSRS 间隔重复：到期卡片 + 新卡片</p>
    <div class="daily-stats">
      <div class="ds">到期 <span id="review-due">0</span></div>
      <div class="ds">新卡 <span id="review-new">0</span></div>
      <div class="ds">7天预测 <span id="review-forecast">0</span></div>
    </div>
  </div>
  <div class="card-counter"><span id="card-pos">0</span> / <span id="card-total">0</span></div>
  <div class="card-wrap" id="card-wrap" onclick="flipCard()">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front" id="card-front">
        <div class="card-cat-tag" id="cf-cat"></div>
        <div class="card-q" id="cf-q"></div>
        <div class="card-flip-hint">点击或按空格键查看答案</div>
        <div class="mastered-badge">✓ 已掌握</div>
      </div>
      <div class="card-face card-back" id="card-back">
        <div class="card-cat-tag" id="cb-cat"></div>
        <div class="answer-title">要点</div>
        <ul id="cb-bullets"></ul>
      </div>
    </div>
  </div>

  <div class="card-actions" id="card-actions">
    <button class="action-btn btn-again" onclick="rate(1)">重来<span class="interval" id="iv-1"></span></button>
    <button class="action-btn btn-hard" onclick="rate(2)">困难<span class="interval" id="iv-2"></span></button>
    <button class="action-btn btn-good" onclick="rate(3)">良好<span class="interval" id="iv-3"></span></button>
    <button class="action-btn btn-easy" onclick="rate(4)">简单<span class="interval" id="iv-4"></span></button>
    <button class="action-btn btn-next" onclick="navigate(1)">下一张 →</button>
  </div>
  <div class="rate-hint" id="rate-hint">翻转卡片后显示评分按钮</div>

  <div class="cat-progress" id="cat-progress-panel">
    <div class="cat-progress-title">各分类掌握进度</div>
    <div class="cat-rows" id="cat-rows"></div>
  </div>
</main>

<!-- Add Card Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2 id="modal-title">添加卡片</h2>
    <label>分类</label>
    <input type="text" id="modal-cat" placeholder="输入分类名 (可新建)" list="cat-list">
    <datalist id="cat-list"></datalist>
    <label>问题</label>
    <input type="text" id="modal-q" placeholder="卡片正面的问题">
    <label>答案要点 (每行一个)</label>
    <textarea id="modal-bullets" placeholder="每行一个要点&#10;支持 <span class='highlight'>高亮</span> 和 <span class='num'>数字</span> 标签"></textarea>
    <input type="hidden" id="modal-edit-id">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-save" onclick="saveCard()">保存</button>
    </div>
  </div>
</div>

<script src="data/cards.js"></script>
<script src="fsrs.js"></script>
<script>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const FSRS_KEY = 'ai_fc_fsrs_states';
const LOG_KEY  = 'ai_fc_fsrs_log';
const SCHEMA_KEY = 'ai_fc_schema_v';
const CUSTOM_KEY = 'ai_fc_custom_cards';

let fsrsStates = {};   // {cardId: {state, due, stability, difficulty, ...}}
let reviewLog = [];    // [{cardId, rating, review_time, ...}]
let customCards = [];
let currentCat = 'ALL';
let mode = 'all';
let shuffled = false;
let displayList = [];
let curIdx = 0;
let isFlipped = false;
let searchQuery = '';
let diffFilter = 0;
let reviewMode = false;

function getAllCards() {
  return [...BUILTIN_CARDS, ...customCards];
}

// ── Persistence ──
function loadFsrsStates() {
  try { fsrsStates = JSON.parse(localStorage.getItem(FSRS_KEY) || '{}'); } catch(e) { fsrsStates = {}; }
}
function saveFsrsStates() {
  localStorage.setItem(FSRS_KEY, JSON.stringify(fsrsStates));
}
function loadReviewLog() {
  try { reviewLog = JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch(e) { reviewLog = []; }
}
function saveReviewLog() {
  localStorage.setItem(LOG_KEY, JSON.stringify(reviewLog));
}
function loadCustomCards() {
  try { customCards = JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]'); } catch(e) { customCards = []; }
}
function saveCustomCards() {
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(customCards));
}

// ── Migration from v1 (binary known/unknown) to v2 (FSRS) ──
function migrateIfNeeded() {
  const version = localStorage.getItem(SCHEMA_KEY);
  if (version === '2') return;

  const oldProgress = {};
  try {
    const raw = localStorage.getItem('ai_fc_progress_v2');
    if (raw) Object.assign(oldProgress, JSON.parse(raw));
  } catch(e) {}

  if (Object.keys(oldProgress).length > 0) {
    const now = new Date();
    for (const [cardId, status] of Object.entries(oldProgress)) {
      if (status === 'known') {
        fsrsStates[cardId] = {
          state: State.Review, due: now.toISOString(),
          stability: 21, difficulty: 5, elapsed_days: 0,
          scheduled_days: 21, reps: 3, lapses: 0,
          last_review: now.toISOString(),
        };
      } else if (status === 'unknown') {
        fsrsStates[cardId] = {
          state: State.Relearning, due: now.toISOString(),
          stability: 0.5, difficulty: 7, elapsed_days: 0,
          scheduled_days: 0, reps: 1, lapses: 1,
          last_review: now.toISOString(),
        };
      }
    }
    saveFsrsStates();
  }
  localStorage.setItem(SCHEMA_KEY, '2');
}

/** Get FSRS state for a card, creating New state if not exists */
function getCardState(cardId) {
  if (!fsrsStates[cardId]) {
    fsrsStates[cardId] = createNewCard();
  }
  return fsrsStates[cardId];
}

/** Helper: is card "mastered" (in Review state with stability > 21 days) */
function isMastered(cardId) {
  const st = fsrsStates[cardId];
  return st && st.state === State.Review && st.stability > 21;
}

/** Helper: is card due for review */
function isDue(cardId) {
  const st = fsrsStates[cardId];
  if (!st || st.state === State.New) return false;
  return new Date(st.due) <= new Date();
}

// ═══════════════════════════════════════════════════════════════
// CATEGORIES
// ═══════════════════════════════════════════════════════════════
function getCats() {
  const cats = ['ALL'];
  getAllCards().forEach(c => { if(!cats.includes(c.cat)) cats.push(c.cat); });
  return cats;
}
function buildNav() {
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';
  const all = getAllCards();
  getCats().forEach(cat => {
    const count = cat === 'ALL' ? all.length : all.filter(c => c.cat === cat).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    btn.innerHTML = cat + `<span class="badge">${count}</span>`;
    btn.onclick = () => { currentCat = cat; buildNav(); buildList(); render(); };
    nav.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════
function onSearch() {
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  buildList();
  render();
}

function matchesSearch(card) {
  if (!searchQuery) return true;
  const text = (card.q + ' ' + card.bullets.join(' ') + ' ' + card.cat).toLowerCase();
  return searchQuery.split(/\s+/).every(term => text.includes(term));
}

// ═══════════════════════════════════════════════════════════════
// DISPLAY LIST
// ═══════════════════════════════════════════════════════════════
function buildList() {
  let base = getAllCards().filter(c => currentCat === 'ALL' || c.cat === currentCat);
  base = base.filter(matchesSearch);
  if(diffFilter > 0) base = base.filter(c => c.lv === diffFilter);
  if(mode === 'known') base = base.filter(c => isMastered(c.id));
  else if(mode === 'unknown') base = base.filter(c => isDue(c.id));
  else if(mode === 'unmarked') base = base.filter(c => {
    const st = fsrsStates[c.id];
    return !st || st.state === State.New;
  });
  if(shuffled) base = [...base].sort(() => Math.random() - 0.5);
  displayList = base.map(c => c.id);
  curIdx = 0;
}
function getCard(id) { return getAllCards().find(c => c.id === id); }
function currentCard() { return displayList.length > 0 ? getCard(displayList[curIdx]) : null; }

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const card = currentCard();
  document.getElementById('card-pos').textContent = displayList.length > 0 ? curIdx + 1 : 0;
  document.getElementById('card-total').textContent = displayList.length;

  if(!card) {
    document.getElementById('card-wrap').style.display = 'none';
    document.getElementById('card-actions').style.display = 'none';
    document.getElementById('rate-hint').classList.remove('show');
    document.querySelector('.card-counter').innerHTML = '<span style="color:#666">没有符合条件的卡片</span>';
    updateStats(); updateCatProgress();
    return;
  }
  document.getElementById('card-wrap').style.display = '';

  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  updateRateButtons();

  const mastered = isMastered(card.id);
  const wrap = document.getElementById('card-wrap');
  if(mastered) wrap.classList.add('is-known'); else wrap.classList.remove('is-known');

  const lvLabels = {1:'★ 初级', 2:'★★ 中级', 3:'★★★ 高级'};
  const lvClass = card.lv ? ` <span class="diff-badge diff-${card.lv}">${lvLabels[card.lv]}</span>` : '';
  document.getElementById('cf-cat').innerHTML = card.cat + lvClass;
  document.getElementById('cf-q').textContent = card.q;
  document.getElementById('cb-cat').innerHTML = card.cat + lvClass;

  const ul = document.getElementById('cb-bullets');
  ul.innerHTML = card.bullets.map(b => `<li>${b}</li>`).join('');

  updateStats();
  updateCatProgress();
}

function updateRateButtons() {
  const card = currentCard();
  const actions = document.getElementById('card-actions');
  const hint = document.getElementById('rate-hint');

  if (!card) { actions.style.display = 'none'; hint.classList.remove('show'); return; }

  if (!isFlipped) {
    // Hide rating buttons, show hint
    actions.style.display = 'none';
    hint.classList.add('show');
    return;
  }

  // Show rating buttons with interval previews
  actions.style.display = '';
  hint.classList.remove('show');
  const st = getCardState(card.id);
  const previews = getIntervalPreview(st, new Date());
  [1,2,3,4].forEach(r => {
    const el = document.getElementById('iv-' + r);
    if (el) el.textContent = previews[r];
  });
}

function updateStats() {
  const all = getAllCards();
  const total = all.length;
  const now = new Date();
  let dueCount = 0, learningCount = 0, masteredCount = 0, newCount = 0;

  all.forEach(c => {
    const st = fsrsStates[c.id];
    if (!st || st.state === State.New) { newCount++; return; }
    if (st.state === State.Learning || st.state === State.Relearning) { learningCount++; }
    if (st.state === State.Review && st.stability > 21) { masteredCount++; }
    if (new Date(st.due) <= now) { dueCount++; }
  });

  document.getElementById('total-count').textContent = total;
  document.getElementById('due-count').textContent = dueCount;
  document.getElementById('learning-count').textContent = learningCount;
  document.getElementById('known-count').textContent = masteredCount;
  document.getElementById('new-count').textContent = newCount;

  const reviewed = total - newCount;
  const pct = total > 0 ? Math.round(reviewed / total * 100) : 0;
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-fill').style.width = pct + '%';
}

function updateCatProgress() {
  const cats = getCats().filter(c => c !== 'ALL');
  const all = getAllCards();
  const rows = document.getElementById('cat-rows');
  rows.innerHTML = cats.map(cat => {
    const catCards = all.filter(c => c.cat === cat);
    const mastered = catCards.filter(c => isMastered(c.id)).length;
    const pct = catCards.length > 0 ? Math.round(mastered / catCards.length * 100) : 0;
    return `<div class="cat-row">
      <div class="cat-row-name">${cat}</div>
      <div class="cat-row-bar"><div class="cat-row-fill" style="width:${pct}%"></div></div>
      <div class="cat-row-pct">${pct}%</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function flipCard() {
  if(!currentCard()) return;
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
  updateRateButtons();
}

function navigate(dir) {
  if(displayList.length === 0) return;
  curIdx = (curIdx + dir + displayList.length) % displayList.length;
  render();
}

function rate(rating) {
  const card = currentCard();
  if(!card || !isFlipped) return;

  const st = getCardState(card.id);
  const result = schedule(st, rating, new Date());
  fsrsStates[card.id] = result.card;
  reviewLog.push({ cardId: card.id, ...result.log });

  saveFsrsStates();
  saveReviewLog();

  if (reviewMode) {
    // Remove rated card from review list, advance
    displayList.splice(curIdx, 1);
    // If Again/Hard in learning, re-add to end for re-review this session
    if (result.card.scheduled_days === 0) {
      displayList.push(card.id);
    }
    if (displayList.length === 0) {
      reviewMode = false;
      document.getElementById('review-banner').classList.remove('show');
      document.getElementById('mode-review').classList.remove('active');
      buildList();
    }
    curIdx = Math.min(curIdx, displayList.length - 1);
    curIdx = Math.max(0, curIdx);
    render();
  } else {
    // Browse mode: just re-render current card
    render();
  }
}

function setMode(m) {
  reviewMode = false;
  document.getElementById('review-banner').classList.remove('show');
  document.getElementById('mode-review').classList.remove('active');
  mode = m;
  ['mode-all','mode-unknown','mode-unmarked'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  const modeMap = {all:'mode-all',unknown:'mode-unknown',unmarked:'mode-unmarked'};
  if(modeMap[m]) document.getElementById(modeMap[m]).classList.add('active');
  buildList();
  render();
}

function toggleShuffle() {
  shuffled = !shuffled;
  document.getElementById('mode-shuffle').classList.toggle('active', shuffled);
  buildList();
  render();
}

function resetProgress() {
  if(!confirm('确认重置所有 FSRS 进度和复习记录？')) return;
  fsrsStates = {};
  reviewLog = [];
  saveFsrsStates();
  saveReviewLog();
  buildList();
  render();
}

// ═══════════════════════════════════════════════════════════════
// ADD / EDIT CARD MODAL
// ═══════════════════════════════════════════════════════════════
function openAddModal() {
  document.getElementById('modal-title').textContent = '添加卡片';
  document.getElementById('modal-cat').value = currentCat === 'ALL' ? '' : currentCat;
  document.getElementById('modal-q').value = '';
  document.getElementById('modal-bullets').value = '';
  document.getElementById('modal-edit-id').value = '';
  // populate datalist
  const dl = document.getElementById('cat-list');
  dl.innerHTML = getCats().filter(c => c !== 'ALL').map(c => `<option value="${c}">`).join('');
  document.getElementById('add-modal').classList.add('show');
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('show');
}

function saveCard() {
  const cat = document.getElementById('modal-cat').value.trim();
  const q = document.getElementById('modal-q').value.trim();
  const bulletsText = document.getElementById('modal-bullets').value.trim();
  if(!cat || !q || !bulletsText) { alert('请填写所有字段'); return; }
  const bullets = bulletsText.split('\n').map(b => b.trim()).filter(b => b);
  const editId = document.getElementById('modal-edit-id').value;

  if(editId) {
    const idx = customCards.findIndex(c => c.id === editId);
    if(idx >= 0) { customCards[idx] = {...customCards[idx], cat, q, bullets}; }
  } else {
    const id = 'custom_' + Date.now();
    customCards.push({id, cat, q, bullets, custom: true});
  }
  saveCustomCards();
  closeAddModal();
  buildNav(); buildList(); render();
}

// ═══════════════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════════
function exportCards() {
  const data = {
    customCards,
    fsrsStates,
    reviewLog,
    schemaVersion: 2,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'flashcards_backup.json'; a.click();
  URL.revokeObjectURL(url);
}

function importCards(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.customCards) {
        const existingIds = new Set(customCards.map(c => c.id));
        data.customCards.forEach(c => {
          if(!existingIds.has(c.id)) customCards.push(c);
        });
        saveCustomCards();
      }
      if(data.fsrsStates) {
        Object.assign(fsrsStates, data.fsrsStates);
        saveFsrsStates();
      }
      if(data.reviewLog) {
        reviewLog = reviewLog.concat(data.reviewLog);
        saveReviewLog();
      }
      // Support importing old v1 format
      if(data.progress && !data.fsrsStates) {
        for (const [cardId, status] of Object.entries(data.progress)) {
          if (!fsrsStates[cardId]) {
            const now = new Date();
            if (status === 'known') {
              fsrsStates[cardId] = { state: State.Review, due: now.toISOString(), stability: 21, difficulty: 5, elapsed_days: 0, scheduled_days: 21, reps: 3, lapses: 0, last_review: now.toISOString() };
            } else if (status === 'unknown') {
              fsrsStates[cardId] = { state: State.Relearning, due: now.toISOString(), stability: 0.5, difficulty: 7, elapsed_days: 0, scheduled_days: 0, reps: 1, lapses: 1, last_review: now.toISOString() };
            }
          }
        }
        saveFsrsStates();
      }
      buildNav(); buildList(); render();
      alert('导入成功！');
    } catch(err) { alert('导入失败：' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══════════════════════════════════════════════════════════════
// DIFFICULTY FILTER
// ═══════════════════════════════════════════════════════════════
function toggleDiff(lv) {
  reviewMode = false;
  document.getElementById('review-banner').classList.remove('show');
  if(diffFilter === lv) { diffFilter = 0; } else { diffFilter = lv; }
  [1,2,3].forEach(l => document.getElementById('diff-'+l).classList.toggle('active', diffFilter === l));
  document.getElementById('mode-review').classList.remove('active');
  buildList(); render();
}

// ═══════════════════════════════════════════════════════════════
// REVIEW SESSION (FSRS-driven)
// ═══════════════════════════════════════════════════════════════
function startReviewSession() {
  reviewMode = !reviewMode;
  document.getElementById('mode-review').classList.toggle('active', reviewMode);
  document.getElementById('review-banner').classList.toggle('show', reviewMode);
  diffFilter = 0;
  [1,2,3].forEach(l => document.getElementById('diff-'+l).classList.remove('active'));

  if(!reviewMode) { buildList(); render(); return; }

  const all = getAllCards();
  const { due, newCards } = getDueCards(all, fsrsStates, new Date());

  // Build review list: due cards first, then up to 10 new cards
  const maxNew = 10;
  const newToStudy = newCards.slice(0, maxNew);
  let reviewList = [...due, ...newToStudy];

  displayList = reviewList.map(c => c.id);
  curIdx = 0;

  document.getElementById('review-due').textContent = due.length;
  document.getElementById('review-new').textContent = newToStudy.length;

  const forecast = getReviewForecast(all, fsrsStates, 7);
  document.getElementById('review-forecast').textContent = forecast.reduce((a,b) => a+b, 0);

  const today = new Date().toLocaleDateString('zh-CN');
  document.getElementById('review-title').textContent = `复习模式 — ${today}`;

  render();
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if(document.getElementById('add-modal').classList.contains('show')) {
    if(e.key === 'Escape') closeAddModal();
    return;
  }
  switch(e.key) {
    case ' ': case 'Enter': e.preventDefault(); flipCard(); break;
    case 'ArrowRight': case 'l': navigate(1); break;
    case 'ArrowLeft': case 'h': navigate(-1); break;
    case '1': rate(1); break;
    case '2': rate(2); break;
    case '3': rate(3); break;
    case '4': rate(4); break;
    case 'Escape': document.getElementById('search-input').value = ''; searchQuery = ''; buildList(); render(); break;
  }
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
loadFsrsStates();
loadReviewLog();
loadCustomCards();
migrateIfNeeded();
buildNav();
buildList();
render();
</script>
