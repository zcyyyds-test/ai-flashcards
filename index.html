<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>AI 技术面试卡片</title>
<script>
  // Apply theme before CSS to avoid FOUC
  (function(){
    try {
      var saved = localStorage.getItem('ai_fc_theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ══════════════════════════════════════════════════════
     和風 Palette · 朱藍抹茶琥珀
     ══════════════════════════════════════════════════════ */
  :root {
    /* Light theme — 和紙 (washi paper) */
    --bg-page: #f5f1e8;
    --bg-card: #fefdf9;
    --bg-card-alt: #faf6ec;
    --bg-surface: #ebe7dc;
    --bg-nav: #f9f5eb;
    --bg-hover: #efeadf;
    --border: #d9d2c4;
    --border-lit: #b8ad9a;
    --text: #1e1a16;
    --text-dim: #4a443d;
    --text-muted: #8a8275;
    --text-faint: #b0a898;
    --vermillion: #c8372d;
    --vermillion-soft: #d4594f;
    --vermillion-dim: rgba(200,55,45,0.08);
    --vermillion-glow: rgba(200,55,45,0.18);
    --indigo: #324b91;
    --indigo-soft: #4a639f;
    --indigo-dim: rgba(50,75,145,0.08);
    --matcha: #4a7c3a;
    --matcha-soft: #5d9149;
    --matcha-dim: rgba(74,124,58,0.08);
    --amber: #b88230;
    --amber-soft: #d09848;
    --amber-dim: rgba(184,130,48,0.09);
    --coral: #c95555;
    --coral-dim: rgba(201,85,85,0.08);
    --ink: #1a1a1a;
    --code-bg: #f3efe4;
    --code-text: #2a2419;
    --code-kw: #7c3aed;
    --code-fn: #1e5db6;
    --code-str: #3f7a32;
    --code-cm: #8a8275;
    --code-num: #b46a1f;
    --code-border: rgba(0,0,0,0.08);
    --card-shadow: 0 1px 2px rgba(40,30,20,0.04), 0 4px 12px rgba(40,30,20,0.04), 0 16px 48px rgba(40,30,20,0.06);
    --card-shadow-lift: 0 2px 4px rgba(40,30,20,0.05), 0 12px 24px rgba(40,30,20,0.08), 0 24px 64px rgba(40,30,20,0.08);
    --texture-dot: rgba(160,145,120,0.22);
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 18px;
    --font: 'Outfit', 'PingFang SC', 'Hiragino Sans', 'Microsoft YaHei', sans-serif;
    --font-display: 'Fraunces', 'Noto Serif JP', Georgia, serif;
    --mono: 'Fira Code', 'JetBrains Mono', monospace;
    --ease: cubic-bezier(0.23, 1, 0.32, 1);
    --ease-out: cubic-bezier(0.4, 0, 0.2, 1);
  }
  [data-theme="dark"] {
    /* Dark theme — 墨絵 (sumi-e ink wash) */
    --bg-page: #15131a;
    --bg-card: #1f1d27;
    --bg-card-alt: #252330;
    --bg-surface: #2a2734;
    --bg-nav: #1a1823;
    --bg-hover: #2e2a39;
    --border: #34303f;
    --border-lit: #4a4558;
    --text: #ebe6d9;
    --text-dim: #bbb4a3;
    --text-muted: #857e6f;
    --text-faint: #5d5849;
    --vermillion: #e85c4f;
    --vermillion-soft: #d74f44;
    --vermillion-dim: rgba(232,92,79,0.12);
    --vermillion-glow: rgba(232,92,79,0.22);
    --indigo: #8ea4db;
    --indigo-soft: #7789c8;
    --indigo-dim: rgba(142,164,219,0.12);
    --matcha: #7bbe65;
    --matcha-soft: #6fac5a;
    --matcha-dim: rgba(123,190,101,0.12);
    --amber: #e0ad58;
    --amber-soft: #d09f4a;
    --amber-dim: rgba(224,173,88,0.12);
    --coral: #e07878;
    --coral-dim: rgba(224,120,120,0.12);
    --ink: #f0ece1;
    --code-bg: #13101c;
    --code-text: #cdd6f4;
    --code-kw: #cba6f7;
    --code-fn: #89b4fa;
    --code-str: #a6e3a1;
    --code-cm: #6c7086;
    --code-num: #fab387;
    --code-border: rgba(0,0,0,0.4);
    --card-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 4px 12px rgba(0,0,0,0.25), 0 16px 48px rgba(0,0,0,0.3);
    --card-shadow-lift: 0 2px 4px rgba(0,0,0,0.4), 0 12px 24px rgba(0,0,0,0.35), 0 24px 64px rgba(0,0,0,0.4);
    --texture-dot: rgba(180,170,140,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg-page);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'ss01', 'cv11';
    background-image:
      radial-gradient(circle at 1px 1px, var(--texture-dot) 0.7px, transparent 0.7px);
    background-size: 22px 22px;
    background-attachment: fixed;
    transition: background-color 0.4s var(--ease-out), color 0.4s var(--ease-out);
  }
  body::before {
    content: ''; position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg,
      var(--vermillion) 0%, var(--amber) 35%, var(--matcha) 65%, var(--indigo) 100%);
    z-index: 200; pointer-events: none;
    opacity: 0.88;
  }
  ::selection { background: var(--vermillion); color: #fff; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-lit); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); background-clip: padding-box; border: 2px solid transparent; }

  /* ══════════════════════════════════════════════════════
     Header
     ══════════════════════════════════════════════════════ */
  header {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    position: sticky; top: 3px; z-index: 50;
    box-shadow: 0 1px 0 var(--border), 0 2px 16px rgba(40,30,20,0.04);
  }
  h1 {
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--vermillion);
    white-space: nowrap;
    letter-spacing: -0.015em;
    font-optical-sizing: auto;
    font-variation-settings: 'SOFT' 30, 'opsz' 14;
    position: relative;
    padding-left: 14px;
  }
  h1::before {
    content: ''; position: absolute; left: 0; top: 50%;
    width: 4px; height: 70%; transform: translateY(-50%);
    background: linear-gradient(180deg, var(--vermillion), var(--amber));
    border-radius: 2px;
  }
  .stats-bar { display: flex; gap: 6px; flex-wrap: wrap; font-size: 0.72rem; }
  .stat-chip {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-radius: 999px; padding: 5px 14px; color: var(--text-dim);
    font-weight: 500; transition: all 0.2s var(--ease-out);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .stat-chip:hover {
    border-color: var(--border-lit);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(40,30,20,0.06);
  }
  .stat-chip span { color: var(--vermillion); font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-due, .stat-due span { color: var(--coral) !important; }
  .overall-progress {
    margin-left: auto; display: flex; align-items: center; gap: 10px;
    font-size: 0.72rem; color: var(--text-dim); font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .prog-bar {
    width: 120px; height: 6px; background: var(--bg-surface);
    border-radius: 999px; overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--vermillion), var(--amber), var(--matcha));
    border-radius: 999px;
    transition: width 0.8s var(--ease);
    box-shadow: 0 0 8px var(--vermillion-glow);
  }

  /* ══════════════════════════════════════════════════════
     Streak bar
     ══════════════════════════════════════════════════════ */
  .streak-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 28px;
    background: linear-gradient(90deg, var(--vermillion-dim), transparent 40%, var(--amber-dim));
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
  }
  .streak-fire {
    font-size: 1.2rem;
    filter: drop-shadow(0 0 6px var(--amber-dim));
  }
  .streak-count {
    color: var(--amber);
    font-weight: 800;
    font-size: 1rem;
    font-variant-numeric: tabular-nums;
    font-family: var(--font-display);
  }
  .streak-label { color: var(--text-muted); }
  .streak-dots { display: flex; gap: 5px; margin-left: auto; }
  .streak-dot {
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--bg-surface); border: 2px solid var(--border);
    transition: all 0.3s var(--ease-out);
  }
  .streak-dot.done {
    background: var(--vermillion); border-color: var(--vermillion);
    box-shadow: 0 0 8px var(--vermillion-glow);
  }
  .streak-dot.today {
    border-color: var(--amber);
    animation: pulse 2s infinite;
  }
  .streak-today { color: var(--text-muted); font-size: 0.7rem; margin-left: 10px; font-style: italic; }

  /* ══════════════════════════════════════════════════════
     Search bar + toolbar
     ══════════════════════════════════════════════════════ */
  .search-bar {
    background: var(--bg-card); border-bottom: 1px solid var(--border);
    padding: 12px 28px; display: flex; gap: 8px; align-items: center;
  }
  .search-bar input {
    flex: 1; background: var(--bg-surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text); padding: 9px 16px;
    font-size: 0.85rem; font-family: var(--font);
    outline: none; transition: all 0.2s var(--ease-out);
  }
  .search-bar input:focus {
    border-color: var(--vermillion);
    box-shadow: 0 0 0 3px var(--vermillion-dim);
    background: var(--bg-card);
  }
  .search-bar input::placeholder { color: var(--text-muted); }
  .toolbar-btn {
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--text-dim);
    padding: 8px 14px; font-size: 0.74rem; font-weight: 600;
    cursor: pointer; font-family: var(--font);
    transition: all 0.18s var(--ease-out); white-space: nowrap;
    position: relative;
  }
  .toolbar-btn:hover {
    border-color: var(--vermillion); color: var(--vermillion);
    background: var(--vermillion-dim); transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--vermillion-dim);
  }
  .toolbar-btn:active { transform: translateY(0); }
  .btn-sync { color: var(--indigo); }
  .btn-sync:hover { border-color: var(--indigo); color: var(--indigo); background: var(--indigo-dim); box-shadow: 0 4px 12px var(--indigo-dim); }
  .btn-lang { color: var(--matcha); font-weight: 700; }
  .btn-lang:hover { border-color: var(--matcha); color: var(--matcha); background: var(--matcha-dim); box-shadow: 0 4px 12px var(--matcha-dim); }
  .btn-theme {
    color: var(--amber);
    width: 36px; padding: 8px 0; text-align: center;
    font-size: 0.9rem;
  }
  .btn-theme:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); box-shadow: 0 4px 12px var(--amber-dim); }

  /* ══════════════════════════════════════════════════════
     Group + Category nav
     ══════════════════════════════════════════════════════ */
  .group-nav {
    background: var(--bg-card); border-bottom: 1px solid var(--border);
    display: flex; gap: 4px; padding: 10px 28px;
    overflow-x: auto; scrollbar-width: thin;
  }
  .group-btn {
    background: transparent; border: 1.5px solid transparent;
    border-radius: var(--radius); color: var(--text-dim);
    padding: 8px 18px; font-size: 0.78rem; font-weight: 600;
    cursor: pointer; font-family: var(--font);
    transition: all 0.2s var(--ease-out); white-space: nowrap;
    position: relative;
  }
  .group-btn:hover { color: var(--text); background: var(--bg-hover); }
  .group-btn.active {
    background: var(--vermillion-dim);
    border-color: rgba(200,55,45,0.22);
    color: var(--vermillion); font-weight: 700;
    box-shadow: inset 0 -2px 0 var(--vermillion);
  }
  .group-btn .badge {
    background: var(--bg-surface); border-radius: 999px;
    padding: 2px 8px; font-size: 0.62rem; margin-left: 6px;
    color: var(--text-muted); font-variant-numeric: tabular-nums;
  }
  .group-btn.active .badge { background: rgba(200,55,45,0.12); color: var(--vermillion); }

  nav {
    background: var(--bg-nav); border-bottom: 1px solid var(--border);
    display: flex; gap: 2px; padding: 7px 28px;
    overflow-x: auto; scrollbar-width: thin;
  }
  .cat-btn {
    background: transparent; border: 1.5px solid transparent;
    border-radius: 8px; color: var(--text-muted);
    padding: 5px 12px; font-size: 0.74rem; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    transition: all 0.18s var(--ease-out); white-space: nowrap;
  }
  .cat-btn:hover { color: var(--text-dim); background: var(--bg-hover); }
  .cat-btn.active {
    color: var(--indigo); background: var(--indigo-dim);
    border-color: rgba(50,75,145,0.18);
    font-weight: 600;
  }
  .cat-btn .badge { font-size: 0.6rem; margin-left: 3px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
  .cat-btn.active .badge { color: var(--indigo); }

  /* ══════════════════════════════════════════════════════
     Controls
     ══════════════════════════════════════════════════════ */
  .controls {
    background: var(--bg-nav); padding: 10px 28px;
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }
  .mode-btn {
    background: transparent; border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--text-dim);
    padding: 6px 14px; font-size: 0.74rem; font-weight: 600;
    cursor: pointer; font-family: var(--font);
    transition: all 0.2s var(--ease-out);
  }
  .mode-btn:hover { border-color: var(--border-lit); color: var(--text); background: var(--bg-hover); }
  .mode-btn.active {
    background: var(--indigo-dim); border-color: var(--indigo);
    color: var(--indigo);
    box-shadow: 0 2px 8px var(--indigo-dim);
  }
  .btn-review { color: var(--vermillion); }
  .btn-review.active {
    background: var(--vermillion-dim); border-color: var(--vermillion);
    color: var(--vermillion);
    box-shadow: 0 2px 8px var(--vermillion-dim);
  }
  .sep { color: var(--border); margin: 0 4px; user-select: none; }
  .shortcut-hint { font-size: 0.65rem; color: var(--text-muted); margin-left: auto; }
  kbd {
    background: var(--bg-surface); border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 4px; padding: 2px 6px;
    font-family: var(--mono); font-size: 0.62rem;
    color: var(--text-dim);
    box-shadow: 0 1px 0 var(--border);
  }

  /* ══════════════════════════════════════════════════════
     Main area
     ══════════════════════════════════════════════════════ */
  main {
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 24px 56px;
    min-height: calc(100vh - 250px);
  }
  .card-counter {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-bottom: 20px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }
  .card-counter span { color: var(--text-dim); font-weight: 700; }

  /* ══════════════════════════════════════════════════════
     Flashcard
     ══════════════════════════════════════════════════════ */
  .card-wrap {
    perspective: 1600px;
    width: 100%; max-width: 760px; height: 440px;
    cursor: pointer; user-select: none;
    animation: cardIn 0.5s var(--ease);
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.7s var(--ease);
    will-change: transform;
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-wrap:hover .card-inner:not(.flipped) {
    transform: translateY(-3px) rotateX(1deg);
  }
  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: var(--radius-lg);
    padding: 36px 40px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .card-front {
    background: var(--bg-card);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    background-image:
      radial-gradient(circle at 100% 0%, var(--vermillion-dim) 0%, transparent 50%),
      radial-gradient(circle at 0% 100%, var(--amber-dim) 0%, transparent 50%);
    transition: box-shadow 0.3s var(--ease-out);
  }
  .card-wrap:hover .card-front { box-shadow: var(--card-shadow-lift); }
  .card-front::before {
    content: ''; position: absolute; top: 0; left: 28px; right: 28px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--vermillion), var(--amber), transparent);
    border-radius: 0 0 3px 3px;
  }
  /* 印章 corner marks — top-right */
  .card-front::after {
    content: '問'; position: absolute; top: 22px; right: 24px;
    font-family: var(--font-display);
    font-size: 1.6rem; font-weight: 700;
    color: var(--vermillion);
    opacity: 0.08;
    letter-spacing: -0.05em;
    user-select: none;
    pointer-events: none;
    z-index: 0;
  }
  .card-back {
    background: var(--bg-card-alt);
    border: 1px solid var(--border);
    box-shadow: var(--card-shadow);
    transform: rotateY(180deg);
    overflow-y: auto;
  }
  .card-back::before {
    content: ''; position: absolute; top: 0; left: 28px; right: 28px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--indigo), var(--matcha), transparent);
    border-radius: 0 0 3px 3px;
    z-index: 5;
  }
  .card-back::after {
    content: '答'; position: absolute; top: 22px; right: 24px;
    font-family: var(--font-display);
    font-size: 1.6rem; font-weight: 700;
    color: var(--indigo);
    opacity: 0.08;
    letter-spacing: -0.05em;
    user-select: none;
    pointer-events: none;
    z-index: 0;
  }
  .card-face { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .card-face::-webkit-scrollbar { width: 5px; }
  .card-face::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .card-cat-tag {
    font-size: 0.64rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 5px 14px; border-radius: 999px;
    display: inline-flex; align-items: center; gap: 6px;
    margin-bottom: 24px; align-self: flex-start;
    font-feature-settings: 'tnum';
    position: relative; z-index: 2;
  }
  .card-front .card-cat-tag {
    background: var(--vermillion-dim); color: var(--vermillion);
    border: 1px solid rgba(200,55,45,0.18);
  }
  .card-back .card-cat-tag {
    background: var(--indigo-dim); color: var(--indigo);
    border: 1px solid rgba(50,75,145,0.18);
  }
  .card-q {
    font-size: 1.4rem; font-weight: 600;
    color: var(--text); line-height: 1.55;
    flex: 1; display: flex; align-items: center;
    font-family: var(--font-display);
    font-variation-settings: 'SOFT' 30, 'opsz' 20;
    letter-spacing: -0.01em;
  }
  .card-flip-hint {
    font-size: 0.74rem; color: var(--text-muted);
    margin-top: 20px; text-align: center;
    letter-spacing: 0.02em;
  }
  .card-flip-hint::before {
    content: '↻ '; font-weight: 700; color: var(--vermillion); margin-right: 4px;
  }

  .card-back .answer-title {
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--indigo); margin-bottom: 16px;
    padding-left: 12px; border-left: 3px solid var(--indigo);
    font-feature-settings: 'tnum';
  }
  .card-back ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .card-back li {
    display: flex; gap: 12px;
    font-size: 0.88rem; line-height: 1.7;
    color: var(--text);
    padding: 2px 0;
  }
  .card-back li::before {
    content: ''; width: 3px;
    align-self: stretch; min-height: 22px;
    background: linear-gradient(180deg, var(--indigo) 0%, var(--matcha) 100%);
    border-radius: 2px; flex-shrink: 0; opacity: 0.3;
  }
  .card-back .bullet-text { flex: 1; min-width: 0; }
  .card-back .highlight { color: var(--vermillion); font-weight: 700; }
  .card-back .num { color: var(--amber); font-weight: 700; font-family: var(--mono); }

  /* ══════════════════════════════════════════════════════
     Details / Glossary
     ══════════════════════════════════════════════════════ */
  .details-section {
    margin-top: 20px; padding-top: 16px;
    border-top: 1px dashed var(--border);
  }
  .term-detail {
    margin-bottom: 10px; border-radius: 10px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    overflow: hidden;
    transition: all 0.25s var(--ease-out);
  }
  .term-detail:hover { border-color: var(--border-lit); }
  .term-detail summary {
    padding: 10px 16px; font-size: 0.8rem; font-weight: 700;
    color: var(--indigo); cursor: pointer;
    list-style: none;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.2s var(--ease-out);
  }
  .term-detail summary::-webkit-details-marker { display: none; }
  .term-detail summary:hover { background: var(--bg-hover); }
  .term-detail summary::before {
    content: '▸'; font-size: 0.72rem;
    color: var(--text-muted);
    transition: transform 0.25s var(--ease-out);
  }
  .term-detail[open] summary::before { transform: rotate(90deg); color: var(--indigo); }
  .term-detail[open] summary {
    border-bottom: 1px solid var(--border);
    background: var(--indigo-dim);
  }
  .term-explain {
    padding: 14px 16px;
    font-size: 0.8rem; line-height: 1.78;
    color: var(--text);
  }
  .term-explain p { margin: 0 0 10px 0; }
  .term-explain p:last-child { margin-bottom: 0; }
  .term-explain .analogy {
    background: var(--amber-dim);
    border-left: 3px solid var(--amber);
    padding: 10px 14px; border-radius: 0 6px 6px 0;
    margin: 10px 0; font-size: 0.78rem; color: var(--text-dim);
  }
  .term-explain .formula {
    background: var(--code-bg); color: var(--code-text);
    padding: 12px 14px; border-radius: 8px;
    font-family: var(--mono); font-size: 0.74rem;
    line-height: 1.7;
    margin: 10px 0; overflow-x: auto; white-space: pre;
    border: 1px solid var(--code-border);
  }
  .term-explain .key-point { color: var(--vermillion); font-weight: 600; }
  .term-explain ul { list-style: none; padding-left: 0; margin: 8px 0; }
  .term-explain ul li {
    display: block;
    position: relative;
    padding-left: 18px;
    font-size: 0.78rem; line-height: 1.7;
    margin-bottom: 6px;
  }
  .term-explain ul li::before {
    content: '·';
    position: absolute; left: 6px; top: 0;
    width: auto; min-height: 0;
    background: none;
    color: var(--matcha);
    font-weight: 700; font-size: 1.2rem;
    opacity: 1;
  }
  .term-explain ol { padding-left: 22px; margin: 8px 0; }
  .term-explain ol li { font-size: 0.78rem; line-height: 1.7; margin-bottom: 6px; color: var(--text); }
  .term-explain ol li::marker { color: var(--matcha); font-weight: 700; }
  .term-explain table { width: 100%; font-size: 0.74rem; margin: 8px 0; border-collapse: collapse; }
  .term-explain table th, .term-explain table td { padding: 6px 8px; border: 1px solid var(--border); text-align: left; }
  .term-explain table th { background: var(--bg-hover); color: var(--indigo); font-weight: 700; }

  /* ══════════════════════════════════════════════════════
     Action buttons (rating)
     ══════════════════════════════════════════════════════ */
  .card-actions {
    display: flex; gap: 10px;
    margin-top: 28px; justify-content: center; flex-wrap: wrap;
  }
  .action-btn {
    border: 1.5px solid transparent;
    border-radius: var(--radius);
    padding: 12px 22px;
    font-size: 0.8rem; font-weight: 700;
    cursor: pointer; font-family: var(--font);
    transition: all 0.2s var(--ease-out);
    display: flex; flex-direction: column;
    align-items: center; gap: 4px; min-width: 90px;
    position: relative;
    letter-spacing: 0.01em;
  }
  .action-btn::before {
    content: ''; position: absolute; inset: 0;
    border-radius: var(--radius);
    background: linear-gradient(180deg, rgba(255,255,255,0.1), transparent);
    pointer-events: none; opacity: 0;
    transition: opacity 0.2s var(--ease-out);
  }
  .action-btn:hover { transform: translateY(-3px); }
  .action-btn:hover::before { opacity: 1; }
  .action-btn:active { transform: scale(0.96) translateY(-1px); }
  .action-btn .interval {
    font-size: 0.62rem; font-weight: 500;
    opacity: 0.7; font-family: var(--mono);
    font-variant-numeric: tabular-nums;
  }
  .btn-again {
    background: var(--coral-dim); color: var(--coral);
    border-color: rgba(201,85,85,0.25);
  }
  .btn-again:hover {
    background: var(--coral); color: #fff5f3;
    box-shadow: 0 8px 20px rgba(201,85,85,0.3);
    border-color: var(--coral);
  }
  .btn-hard {
    background: var(--amber-dim); color: var(--amber);
    border-color: rgba(184,130,48,0.25);
  }
  .btn-hard:hover {
    background: var(--amber); color: #1e1a10;
    box-shadow: 0 8px 20px rgba(184,130,48,0.3);
    border-color: var(--amber);
  }
  .btn-good {
    background: var(--matcha-dim); color: var(--matcha);
    border-color: rgba(74,124,58,0.25);
  }
  .btn-good:hover {
    background: var(--matcha); color: #0f2410;
    box-shadow: 0 8px 20px rgba(74,124,58,0.3);
    border-color: var(--matcha);
  }
  .btn-easy {
    background: var(--indigo-dim); color: var(--indigo);
    border-color: rgba(50,75,145,0.25);
  }
  .btn-easy:hover {
    background: var(--indigo); color: #eef1ff;
    box-shadow: 0 8px 20px rgba(50,75,145,0.3);
    border-color: var(--indigo);
  }
  [data-theme="dark"] .btn-hard:hover { color: #1a1408; }
  [data-theme="dark"] .btn-good:hover { color: #0a1a0c; }
  .btn-next {
    background: var(--bg-surface); color: var(--text-dim);
    border-color: var(--border);
  }
  .btn-next:hover {
    border-color: var(--border-lit); color: var(--text);
    background: var(--bg-hover);
  }
  .card-actions.need-flip { display: none; }
  .rate-hint {
    font-size: 0.78rem; color: var(--text-muted);
    margin-top: 16px; text-align: center;
    display: none;
    font-style: italic;
    letter-spacing: 0.02em;
  }
  .rate-hint.show { display: block; animation: fadeIn 0.3s var(--ease-out); }
  .rate-hint::before { content: '✦ '; color: var(--amber); margin-right: 4px; }

  /* ══════════════════════════════════════════════════════
     Empty state / No cards
     ══════════════════════════════════════════════════════ */
  .no-cards {
    text-align: center; color: var(--text-muted);
    padding: 60px 20px;
  }
  .no-cards h2 {
    font-size: 1.15rem; color: var(--text-dim);
    margin-bottom: 10px;
    font-family: var(--font-display);
  }

  /* ══════════════════════════════════════════════════════
     Progress panel
     ══════════════════════════════════════════════════════ */
  .cat-progress {
    width: 100%; max-width: 760px; margin-top: 40px;
    padding: 24px 28px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--card-shadow);
  }
  .cat-progress-title {
    font-size: 0.7rem; color: var(--text-muted);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-weight: 700;
    padding-left: 10px;
    border-left: 2px solid var(--vermillion);
  }
  .cat-rows { display: flex; flex-direction: column; gap: 9px; }
  .cat-row {
    display: flex; align-items: center; gap: 14px;
    font-size: 0.74rem;
    padding: 4px 0;
    transition: all 0.2s var(--ease-out);
  }
  .cat-row:hover { transform: translateX(2px); }
  .cat-row-name {
    width: 130px; color: var(--text-dim);
    white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 600;
  }
  .cat-row-bar {
    flex: 1; height: 6px;
    background: var(--bg-surface);
    border-radius: 999px; overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
  }
  .cat-row-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--vermillion), var(--amber));
    border-radius: 999px;
    transition: width 0.8s var(--ease);
    position: relative;
  }
  .cat-row-fill::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.2), transparent);
    border-radius: inherit;
  }
  .cat-row-pct {
    width: 40px; text-align: right;
    color: var(--text-muted); font-size: 0.7rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  /* ══════════════════════════════════════════════════════
     Mastered badge
     ══════════════════════════════════════════════════════ */
  .mastered-badge {
    display: none; position: absolute; top: 22px; right: 24px;
    background: var(--matcha-dim);
    border: 1px solid rgba(74,124,58,0.25);
    border-radius: 999px; padding: 4px 12px;
    font-size: 0.64rem; color: var(--matcha);
    font-weight: 700; letter-spacing: 0.03em;
    z-index: 10;
  }
  .is-known .mastered-badge { display: block; }
  .is-known .card-front::after { opacity: 0; }

  /* ══════════════════════════════════════════════════════
     Modal
     ══════════════════════════════════════════════════════ */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(20,15,10,0.5);
    backdrop-filter: blur(10px);
    z-index: 100;
    align-items: center; justify-content: center;
    animation: fadeIn 0.2s var(--ease-out);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 36px;
    width: 90%; max-width: 640px; max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 32px 80px rgba(20,15,10,0.2);
    animation: modalIn 0.3s var(--ease);
  }
  .modal h2 {
    font-family: var(--font-display);
    font-size: 1.2rem; color: var(--vermillion);
    margin-bottom: 24px; font-weight: 700;
    padding-left: 14px;
    border-left: 3px solid var(--vermillion);
  }
  .modal label {
    display: block; font-size: 0.74rem;
    color: var(--text-dim);
    margin-bottom: 8px; margin-top: 16px;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .modal input, .modal select, .modal textarea {
    width: 100%; background: var(--bg-surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    padding: 10px 14px; font-size: 0.88rem;
    outline: none; font-family: var(--font);
    transition: all 0.2s var(--ease-out);
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus {
    border-color: var(--vermillion);
    box-shadow: 0 0 0 3px var(--vermillion-dim);
    background: var(--bg-card);
  }
  .modal textarea { min-height: 130px; resize: vertical; font-family: var(--mono); font-size: 0.82rem; }
  .modal-actions {
    display: flex; gap: 10px; margin-top: 28px;
    justify-content: flex-end;
  }
  .modal-actions button {
    padding: 10px 26px; border-radius: var(--radius);
    font-size: 0.84rem; font-weight: 700;
    cursor: pointer; border: none; font-family: var(--font);
    transition: all 0.2s var(--ease-out);
    letter-spacing: 0.02em;
  }
  .modal-actions .btn-save {
    background: var(--vermillion); color: #fff;
    box-shadow: 0 4px 12px var(--vermillion-dim);
  }
  .modal-actions .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px var(--vermillion-glow);
  }
  .modal-actions .btn-cancel {
    background: var(--bg-surface); color: var(--text-dim);
    border: 1.5px solid var(--border);
  }
  .modal-actions .btn-cancel:hover { border-color: var(--border-lit); color: var(--text); }

  /* ══════════════════════════════════════════════════════
     Custom card badge
     ══════════════════════════════════════════════════════ */
  .custom-badge {
    position: absolute; top: 22px; left: 24px;
    background: var(--amber-dim);
    border: 1px solid rgba(184,130,48,0.25);
    border-radius: 999px; padding: 4px 12px;
    font-size: 0.62rem; color: var(--amber);
    font-weight: 700; letter-spacing: 0.04em;
  }

  /* ══════════════════════════════════════════════════════
     Code blocks
     ══════════════════════════════════════════════════════ */
  .card-back code {
    background: var(--indigo-dim); padding: 2px 6px;
    border-radius: 4px; font-family: var(--mono);
    font-size: 0.8rem; color: var(--indigo);
    border: 1px solid rgba(50,75,145,0.15);
  }
  [data-theme="dark"] .card-back code {
    color: #b8c8ed;
    background: rgba(142,164,219,0.16);
    border-color: rgba(142,164,219,0.28);
  }
  .card-back pre {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: 10px;
    padding: 16px 18px;
    margin: 10px 0 4px 0;
    overflow-x: auto; font-family: var(--mono);
    font-size: 0.76rem; line-height: 1.65;
    color: var(--code-text); white-space: pre;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .card-back pre .kw { color: var(--code-kw); }
  .card-back pre .fn { color: var(--code-fn); }
  .card-back pre .str { color: var(--code-str); }
  .card-back pre .cm { color: var(--code-cm); font-style: italic; }
  .card-back pre .num { color: var(--code-num); font-weight: normal; font-family: inherit; }

  /* ══════════════════════════════════════════════════════
     Difficulty badge
     ══════════════════════════════════════════════════════ */
  .diff-badge {
    display: inline-block; font-size: 0.6rem;
    padding: 2px 9px; border-radius: 999px;
    margin-left: 8px; font-weight: 700;
    vertical-align: middle; letter-spacing: 0.04em;
  }
  .diff-1 { background: var(--matcha-dim); color: var(--matcha); border: 1px solid rgba(74,124,58,0.2); }
  .diff-2 { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(184,130,48,0.2); }
  .diff-3 { background: var(--coral-dim); color: var(--coral); border: 1px solid rgba(201,85,85,0.2); }

  /* ══════════════════════════════════════════════════════
     Review banner
     ══════════════════════════════════════════════════════ */
  .daily-banner {
    background: var(--bg-card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 22px;
    margin-bottom: 24px;
    width: 100%; max-width: 760px;
    display: none;
    box-shadow: var(--card-shadow);
    position: relative;
    overflow: hidden;
  }
  .daily-banner::before {
    content: ''; position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, var(--vermillion), var(--amber));
  }
  .daily-banner.show { display: block; animation: fadeIn 0.4s var(--ease); }
  .daily-banner h3 {
    font-size: 0.92rem; color: var(--vermillion);
    margin-bottom: 8px; font-weight: 700;
    font-family: var(--font-display);
  }
  .daily-banner p { font-size: 0.76rem; color: var(--text-dim); }
  .daily-banner .daily-stats {
    display: flex; gap: 20px;
    margin-top: 12px; font-size: 0.76rem;
  }
  .daily-banner .ds { color: var(--text-dim); }
  .daily-banner .ds span {
    font-weight: 800; color: var(--vermillion);
    font-family: var(--font-display);
    font-variant-numeric: tabular-nums;
  }

  /* ══════════════════════════════════════════════════════
     Animations
     ══════════════════════════════════════════════════════ */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px) scale(0.98); }
    to { opacity: 1; transform: none; }
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(-8px); }
    to { opacity: 1; transform: none; }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(184,130,48,0.4); }
    50% { box-shadow: 0 0 0 5px rgba(184,130,48,0); }
  }

  /* ══════════════════════════════════════════════════════
     Responsive
     ══════════════════════════════════════════════════════ */
  @media (max-width: 640px) {
    header { padding: 12px 16px; gap: 10px; }
    h1 { font-size: 1.05rem; padding-left: 10px; }
    .streak-bar, .search-bar, .group-nav, nav, .controls { padding-left: 16px; padding-right: 16px; }
    main { padding: 24px 16px 40px; }
    .card-wrap { height: 560px; }
    .card-face { padding: 24px 22px; }
    .card-front { overflow-y: auto; }
    .card-q { font-size: 1.1rem; }
    .shortcut-hint { display: none; }
    .cat-progress { padding: 18px 20px; }
    .action-btn { min-width: 72px; padding: 10px 14px; font-size: 0.74rem; }
  }
  @media (max-width: 480px) {
    .card-wrap { height: 600px; }
    .action-btn { min-width: 64px; padding: 9px 10px; font-size: 0.7rem; }
    .stats-bar { font-size: 0.68rem; }
    .stat-chip { padding: 4px 10px; }
  }
</style>
</head>
<body>

<header>
  <h1>AI 技术面试卡片</h1>
  <div class="stats-bar">
    <div class="stat-chip">总计 <span id="total-count">0</span> 张</div>
    <div class="stat-chip stat-due">待复习 <span id="due-count">0</span></div>
    <div class="stat-chip">学习中 <span id="learning-count">0</span></div>
    <div class="stat-chip">已掌握 <span id="known-count">0</span> 张</div>
    <div class="stat-chip">新卡 <span id="new-count">0</span></div>
  </div>
  <div class="overall-progress">
    <span id="overall-pct">0%</span>
    <div class="prog-bar"><div class="prog-fill" id="overall-fill" style="width:0%"></div></div>
  </div>
</header>

<div class="streak-bar" id="streak-bar">
  <span class="streak-fire" id="streak-icon">&#x1f525;</span>
  <span class="streak-count" id="streak-count">0</span>
  <span class="streak-label">天连续打卡</span>
  <span class="streak-today" id="streak-today-label"></span>
  <div class="streak-dots" id="streak-dots"></div>
</div>

<div class="search-bar">
  <input type="text" id="search-input" placeholder="搜索卡片 (问题或答案)..." oninput="onSearch()">
  <button class="toolbar-btn" onclick="openAddModal()">+ 添加卡片</button>
  <button class="toolbar-btn" onclick="exportCards()">导出</button>
  <button class="toolbar-btn" onclick="document.getElementById('import-file').click()">导入</button>
  <input type="file" id="import-file" accept=".json" style="display:none" onchange="importCards(event)">
  <button class="toolbar-btn btn-sync" onclick="syncProgress()">同步</button>
  <button class="toolbar-btn btn-lang" id="lang-toggle" onclick="toggleLang()">日本語</button>
  <button class="toolbar-btn btn-theme" id="theme-toggle" onclick="toggleTheme()" aria-label="切换明暗主题" aria-pressed="false" title="切换主题 (明/暗)">☾</button>
</div>

<div class="group-nav" id="group-nav"></div>
<nav id="cat-nav"></nav>

<div class="controls">
  <button class="mode-btn active" id="mode-all" onclick="setMode('all')">全部</button>
  <button class="mode-btn" id="mode-unknown" onclick="setMode('unknown')">待复习</button>
  <button class="mode-btn" id="mode-unmarked" onclick="setMode('unmarked')">新卡片</button>
  <button class="mode-btn" id="mode-shuffle" onclick="toggleShuffle()">随机</button>
  <span class="sep">|</span>
  <button class="mode-btn" id="diff-1" onclick="toggleDiff(1)">★ 初级</button>
  <button class="mode-btn" id="diff-2" onclick="toggleDiff(2)">★★ 中级</button>
  <button class="mode-btn" id="diff-3" onclick="toggleDiff(3)">★★★ 高级</button>
  <span class="sep">|</span>
  <button class="mode-btn btn-review" id="mode-review" onclick="startReviewSession()">开始复习</button>
  <button class="mode-btn" onclick="resetProgress()">重置进度</button>
  <span class="shortcut-hint"><kbd>空格</kbd> 翻转 &nbsp; <kbd>←</kbd><kbd>→</kbd> 切换 &nbsp; <kbd>1</kbd>重来 <kbd>2</kbd>困难 <kbd>3</kbd>良好 <kbd>4</kbd>简单</span>
</div>

<main>
  <div class="daily-banner" id="review-banner">
    <h3 id="review-title">复习模式</h3>
    <p>FSRS 间隔重复：到期卡片 + 新卡片</p>
    <div class="daily-stats">
      <div class="ds">到期 <span id="review-due">0</span></div>
      <div class="ds">新卡 <span id="review-new">0</span></div>
      <div class="ds">7天预测 <span id="review-forecast">0</span></div>
    </div>
  </div>
  <div class="card-counter"><span id="card-pos">0</span> / <span id="card-total">0</span></div>
  <div class="card-wrap" id="card-wrap" onclick="flipCard(event)">
    <div class="card-inner" id="card-inner">
      <div class="card-face card-front" id="card-front">
        <div class="card-cat-tag" id="cf-cat"></div>

    <button class="action-btn btn-hard" onclick="rate(2)">困难<span class="interval" id="iv-2"></span></button>
    <button class="action-btn btn-good" onclick="rate(3)">良好<span class="interval" id="iv-3"></span></button>
    <button class="action-btn btn-easy" onclick="rate(4)">简单<span class="interval" id="iv-4"></span></button>
    <button class="action-btn btn-next" onclick="navigate(1)">下一张 →</button>

    <div class="cat-rows" id="cat-rows"></div>

</main>

<!-- Add Card Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2 id="modal-title">添加卡片</h2>
    <label>分类</label>
    <input type="text" id="modal-cat" placeholder="输入分类名 (可新建)" list="cat-list">

    <textarea id="modal-bullets" placeholder="每行一个要点&#10;支持 <span class='highlight'>高亮</span> 和 <span class='num'>数字</span> 标签"></textarea>
    <input type="hidden" id="modal-edit-id">

    </div>

<script src="data/cards.js?v=11"></script>
<script src="fsrs.js?v=7"></script>
<script>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const FSRS_KEY = 'ai_fc_fsrs_states';
const LOG_KEY  = 'ai_fc_fsrs_log';
const SCHEMA_KEY = 'ai_fc_schema_v';
const CUSTOM_KEY = 'ai_fc_custom_cards';

let fsrsStates = {};   // {cardId: {state, due, stability, difficulty, ...}}
let reviewLog = [];    // [{cardId, rating, review_time, ...}]
let customCards = [];
let currentCat = 'ALL';
let mode = 'all';
let shuffled = false;
let displayList = [];
let curIdx = 0;
let isFlipped = false;
let searchQuery = '';
let diffFilter = 0;
let reviewMode = false;
let currentLang = localStorage.getItem('ai_fc_lang') || 'zh';
let currentTheme = localStorage.getItem('ai_fc_theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

function getAllCards() {
  return [...BUILTIN_CARDS, ...customCards];
}

// ── Persistence ──
function loadFsrsStates() {
  try { fsrsStates = JSON.parse(localStorage.getItem(FSRS_KEY) || '{}'); } catch(e) { fsrsStates = {}; }
}
function saveFsrsStates() {
  localStorage.setItem(FSRS_KEY, JSON.stringify(fsrsStates));
}
function loadReviewLog() {
  try { reviewLog = JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch(e) { reviewLog = []; }
}
function saveReviewLog() {
  localStorage.setItem(LOG_KEY, JSON.stringify(reviewLog));
}
function loadCustomCards() {
  try { customCards = JSON.parse(localStorage.getItem(CUSTOM_KEY) || '[]'); } catch(e) { customCards = []; }
}
function saveCustomCards() {
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(customCards));
}

// ── Migration from v1 (binary known/unknown) to v2 (FSRS) ──
function migrateIfNeeded() {
  const version = localStorage.getItem(SCHEMA_KEY);
  if (version === '2') return;

  const oldProgress = {};
  try {
    const raw = localStorage.getItem('ai_fc_progress_v2');
    if (raw) Object.assign(oldProgress, JSON.parse(raw));
  } catch(e) {}

  if (Object.keys(oldProgress).length > 0) {
    const now = new Date();
    for (const [cardId, status] of Object.entries(oldProgress)) {
      if (status === 'known') {
        fsrsStates[cardId] = {
          state: State.Review, due: now.toISOString(),
          stability: 21, difficulty: 5, elapsed_days: 0,
          scheduled_days: 21, reps: 3, lapses: 0,
          last_review: now.toISOString(),
        };
      } else if (status === 'unknown') {
        fsrsStates[cardId] = {
          state: State.Relearning, due: now.toISOString(),
          stability: 0.5, difficulty: 7, elapsed_days: 0,
          scheduled_days: 0, reps: 1, lapses: 1,
          last_review: now.toISOString(),
        };
      }
    }
    saveFsrsStates();
  }
  localStorage.setItem(SCHEMA_KEY, '2');
}

/** Get FSRS state for a card, creating New state if not exists */
function getCardState(cardId) {
  if (!fsrsStates[cardId]) {
    fsrsStates[cardId] = createNewCard();
  }
  return fsrsStates[cardId];
}

/** Helper: is card "mastered" (in Review state with stability > 21 days) */
function isMastered(cardId) {
  const st = fsrsStates[cardId];
  return st && st.state === State.Review && st.stability > 21;
}

/** Helper: is card due for review */
function isDue(cardId) {
  const st = fsrsStates[cardId];
  if (!st || st.state === State.New) return false;
  return new Date(st.due) <= new Date();
}

// ═══════════════════════════════════════════════════════════════
// CATEGORIES & GROUPS
// ═══════════════════════════════════════════════════════════════
let currentGroup = 'ALL';
const GROUP_ORDER = ['ALL', '面试', '项目', '面经', '基础', '工程', '编程题'];

function getGroups() {
  const groups = new Set();
  getAllCards().forEach(c => { if(c.group) groups.add(c.group); });
  return ['ALL', ...GROUP_ORDER.filter(g => g !== 'ALL' && groups.has(g))];
}

function getCats() {
  const cats = ['ALL'];
  getAllCards().forEach(c => {
    if(currentGroup !== 'ALL' && c.group !== currentGroup) return;
    if(!cats.includes(c.cat)) cats.push(c.cat);
  });
  return cats;
}

function buildNav() {
  // Group nav
  const groupNav = document.getElementById('group-nav');
  groupNav.innerHTML = '';
  const all = getAllCards();
  getGroups().forEach(group => {
    const count = group === 'ALL' ? all.length : all.filter(c => c.group === group).length;
    const btn = document.createElement('button');
    btn.className = 'group-btn' + (group === currentGroup ? ' active' : '');
    btn.innerHTML = (group === 'ALL' ? '全部' : group) + `<span class="badge">${count}</span>`;
    btn.onclick = () => { currentGroup = group; currentCat = 'ALL'; buildNav(); buildList(); render(); };
    groupNav.appendChild(btn);
  });

  // Category nav (filtered by group)
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = '';
  getCats().forEach(cat => {
    const filtered = all.filter(c => (currentGroup === 'ALL' || c.group === currentGroup));
    const count = cat === 'ALL' ? filtered.length : filtered.filter(c => c.cat === cat).length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === currentCat ? ' active' : '');
    btn.innerHTML = (cat === 'ALL' ? '全部' : cat) + `<span class="badge">${count}</span>`;
    btn.onclick = () => { currentCat = cat; buildNav(); buildList(); render(); };
    nav.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════
function onSearch() {
  searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
  buildList();
  render();
}

function matchesSearch(card) {
  if (!searchQuery) return true;
  const text = (card.q + ' ' + card.bullets.join(' ') + ' ' + card.cat + ' ' + (card.q_ja || '') + ' ' + (card.bullets_ja || []).join(' ')).toLowerCase();
  return searchQuery.split(/\s+/).every(term => text.includes(term));
}

// ═══════════════════════════════════════════════════════════════
// DISPLAY LIST
// ═══════════════════════════════════════════════════════════════
function buildList() {
  let base = getAllCards();
  if(currentGroup !== 'ALL') base = base.filter(c => c.group === currentGroup);
  base = base.filter(c => currentCat === 'ALL' || c.cat === currentCat);
  base = base.filter(matchesSearch);
  if(diffFilter > 0) base = base.filter(c => c.lv === diffFilter);
  if(mode === 'known') base = base.filter(c => isMastered(c.id));
  else if(mode === 'unknown') base = base.filter(c => isDue(c.id));
  else if(mode === 'unmarked') base = base.filter(c => {
    const st = fsrsStates[c.id];
    return !st || st.state === State.New;
  });
  if(shuffled) base = [...base].sort(() => Math.random() - 0.5);
  displayList = base.map(c => c.id);
  curIdx = 0;
}
function getCard(id) { return getAllCards().find(c => c.id === id); }
function currentCard() { return displayList.length > 0 ? getCard(displayList[curIdx]) : null; }

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const card = currentCard();
  document.getElementById('card-pos').textContent = displayList.length > 0 ? curIdx + 1 : 0;
  document.getElementById('card-total').textContent = displayList.length;

  if(!card) {
    document.getElementById('card-wrap').style.display = 'none';
    document.getElementById('card-actions').style.display = 'none';
    document.getElementById('rate-hint').classList.remove('show');
    document.querySelector('.card-counter').innerHTML = '<span style="color:#666">没有符合条件的卡片</span>';
    updateStats(); updateCatProgress();
    return;
  }
  document.getElementById('card-wrap').style.display = '';

  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  updateRateButtons();

  const mastered = isMastered(card.id);
  const wrap = document.getElementById('card-wrap');
  if(mastered) wrap.classList.add('is-known'); else wrap.classList.remove('is-known');

  const lvLabels = {1:'★ 初级', 2:'★★ 中级', 3:'★★★ 高级'};
  const lvClass = card.lv ? ` <span class="diff-badge diff-${card.lv}">${lvLabels[card.lv]}</span>` : '';
  document.getElementById('cf-cat').innerHTML = card.cat + lvClass;
  document.getElementById('cf-q').textContent = (currentLang === 'ja' && card.q_ja) ? card.q_ja : card.q;
  document.getElementById('cb-cat').innerHTML = card.cat + lvClass;

  const ul = document.getElementById('cb-bullets');
  const bullets = (currentLang === 'ja' && card.bullets_ja) ? card.bullets_ja : card.bullets;
  ul.innerHTML = bullets.map(b => `<li><div class="bullet-text">${b}</div></li>`).join('');

  // Render details/glossary section if present
  const detailsContainer = document.getElementById('cb-details');
  const details = (currentLang === 'ja' && card.details_ja) ? card.details_ja : (card.details || []);
  if (details.length > 0) {
    detailsContainer.style.display = '';
    detailsContainer.innerHTML = details.map(d => `<details class="term-detail"><summary>${d.term}</summary><div class="term-explain">${d.explain}</div></details>`).join('');
  } else {
    detailsContainer.style.display = 'none';
    detailsContainer.innerHTML = '';
  }

  updateStats();
  updateCatProgress();
}

function updateRateButtons() {
  const card = currentCard();
  const actions = document.getElementById('card-actions');
  const hint = document.getElementById('rate-hint');

  if (!card) { actions.style.display = 'none'; hint.classList.remove('show'); return; }

  if (!isFlipped) {
    // Hide rating buttons, show hint
    actions.style.display = 'none';
    hint.classList.add('show');
    return;
  }

  // Show rating buttons with interval previews
  actions.style.display = '';
  hint.classList.remove('show');
  const st = getCardState(card.id);
  const previews = getIntervalPreview(st, new Date());
  [1,2,3,4].forEach(r => {
    const el = document.getElementById('iv-' + r);
    if (el) el.textContent = previews[r];
  });
}

function updateStats() {
  const all = getAllCards();
  const total = all.length;
  const now = new Date();
  let dueCount = 0, learningCount = 0, masteredCount = 0, newCount = 0;

  all.forEach(c => {
    const st = fsrsStates[c.id];
    if (!st || st.state === State.New) { newCount++; return; }
    if (st.state === State.Learning || st.state === State.Relearning) { learningCount++; }
    if (st.state === State.Review && st.stability > 21) { masteredCount++; }
    if (new Date(st.due) <= now) { dueCount++; }
  });

  document.getElementById('total-count').textContent = total;
  document.getElementById('due-count').textContent = dueCount;
  document.getElementById('learning-count').textContent = learningCount;
  document.getElementById('known-count').textContent = masteredCount;
  document.getElementById('new-count').textContent = newCount;

  const reviewed = total - newCount;
  const pct = total > 0 ? Math.round(reviewed / total * 100) : 0;
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-fill').style.width = pct + '%';
}

function updateCatProgress() {
  const cats = getCats().filter(c => c !== 'ALL');
  const all = getAllCards();
  const rows = document.getElementById('cat-rows');
  rows.innerHTML = cats.map(cat => {
    const catCards = all.filter(c => c.cat === cat);
    const mastered = catCards.filter(c => isMastered(c.id)).length;
    const pct = catCards.length > 0 ? Math.round(mastered / catCards.length * 100) : 0;
    return `<div class="cat-row">
      <div class="cat-row-name">${cat}</div>
      <div class="cat-row-bar"><div class="cat-row-fill" style="width:${pct}%"></div></div>
      <div class="cat-row-pct">${pct}%</div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function flipCard(e) {
  if(!currentCard()) return;
  // Don't flip when clicking details/summary or links inside the card back
  if(e && e.target.closest('.details-section, summary, .term-detail, a')) return;
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
  updateRateButtons();
}

function navigate(dir) {
  if(displayList.length === 0) return;
  curIdx = (curIdx + dir + displayList.length) % displayList.length;
  render();
}

function rate(rating) {
  const card = currentCard();
  if(!card) return;
  if(!isFlipped) {
    const hint = document.getElementById('rate-hint');
    if (hint) {
      hint.textContent = '先翻转卡片再评分';
      hint.classList.add('show');
      hint.style.animation = 'none';
      void hint.offsetHeight;
      hint.style.animation = 'fadeIn 0.3s var(--ease-out)';
    }
    return;
  }

  const st = getCardState(card.id);
  const result = schedule(st, rating, new Date());
  fsrsStates[card.id] = result.card;
  reviewLog.push({ cardId: card.id, ...result.log });

  saveFsrsStates();
  saveReviewLog();

  if (reviewMode) {
    // Remove rated card from review list, advance
    displayList.splice(curIdx, 1);
    // If Again/Hard in learning, re-add to end for re-review this session
    if (result.card.scheduled_days === 0) {
      displayList.push(card.id);
    }
    if (displayList.length === 0) {
      reviewMode = false;
      document.getElementById('review-banner').classList.remove('show');
      document.getElementById('mode-review').classList.remove('active');
      buildList();
    }
    curIdx = Math.min(curIdx, displayList.length - 1);
    curIdx = Math.max(0, curIdx);
    render();
  } else {
    // Browse mode: just re-render current card
    render();
  }
}

function setMode(m) {
  reviewMode = false;
  document.getElementById('review-banner').classList.remove('show');
  document.getElementById('mode-review').classList.remove('active');
  mode = m;
  ['mode-all','mode-unknown','mode-unmarked'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  const modeMap = {all:'mode-all',unknown:'mode-unknown',unmarked:'mode-unmarked'};
  if(modeMap[m]) document.getElementById(modeMap[m]).classList.add('active');
  buildList();
  render();
}

function toggleShuffle() {
  shuffled = !shuffled;
  document.getElementById('mode-shuffle').classList.toggle('active', shuffled);
  buildList();
  render();
}

function toggleLang() {
  currentLang = currentLang === 'zh' ? 'ja' : 'zh';
  localStorage.setItem('ai_fc_lang', currentLang);
  document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? '日本語' : '中文';
  render();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  const btn = document.getElementById('theme-toggle');
  if (btn) {
    btn.textContent = currentTheme === 'dark' ? '☀' : '☾';
    btn.setAttribute('aria-pressed', currentTheme === 'dark' ? 'true' : 'false');
  }
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('ai_fc_theme', currentTheme);
  applyTheme();
}

function resetProgress() {
  if(!confirm('确认重置所有 FSRS 进度和复习记录？')) return;
  fsrsStates = {};
  reviewLog = [];
  saveFsrsStates();
  saveReviewLog();
  buildList();
  render();
}

// ═══════════════════════════════════════════════════════════════
// ADD / EDIT CARD MODAL
// ═══════════════════════════════════════════════════════════════
function openAddModal() {
  document.getElementById('modal-title').textContent = '添加卡片';
  document.getElementById('modal-cat').value = currentCat === 'ALL' ? '' : currentCat;
  document.getElementById('modal-q').value = '';
  document.getElementById('modal-bullets').value = '';
  document.getElementById('modal-edit-id').value = '';
  // populate datalist
  const dl = document.getElementById('cat-list');
  dl.innerHTML = getCats().filter(c => c !== 'ALL').map(c => `<option value="${c}">`).join('');
  document.getElementById('add-modal').classList.add('show');
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('show');
}

function saveCard() {
  const cat = document.getElementById('modal-cat').value.trim();
  const q = document.getElementById('modal-q').value.trim();
  const bulletsText = document.getElementById('modal-bullets').value.trim();
  if(!cat || !q || !bulletsText) { alert('请填写所有字段'); return; }
  const bullets = bulletsText.split('\n').map(b => b.trim()).filter(b => b);
  const editId = document.getElementById('modal-edit-id').value;

  if(editId) {
    const idx = customCards.findIndex(c => c.id === editId);
    if(idx >= 0) { customCards[idx] = {...customCards[idx], cat, q, bullets}; }
  } else {
    const id = 'custom_' + Date.now();
    customCards.push({id, cat, q, bullets, custom: true});
  }
  saveCustomCards();
  closeAddModal();
  buildNav(); buildList(); render();
}

// ═══════════════════════════════════════════════════════════════
// SYNC (cross-device via compressed URL or clipboard)
// ═══════════════════════════════════════════════════════════════
function syncProgress() {
  const stateCount = Object.keys(fsrsStates).length;
  const actions = [
    stateCount > 0 ? `导出进度 (${stateCount}张卡片)` : null,
    '从剪贴板导入进度',
  ].filter(Boolean);

  if (stateCount > 0) {
    if (confirm(`复制 ${stateCount} 张卡片的 FSRS 进度到剪贴板？\n\n在另一台设备上点"同步"→"从剪贴板导入"即可恢复。\n\n点"取消"改为从剪贴板导入。`)) {
      exportToClipboard();
    } else {
      importFromClipboard();
    }
  } else {
    importFromClipboard();
  }
}

function exportToClipboard() {
  const data = { v: 2, s: fsrsStates, t: Date.now() };
  const json = JSON.stringify(data);
  // Compress with base64
  const encoded = btoa(unescape(encodeURIComponent(json)));
  navigator.clipboard.writeText(encoded).then(() => {
    alert(`已复制到剪贴板！(${(encoded.length/1024).toFixed(1)}KB)\n\n在另一台设备上点"同步"→取消→粘贴即可恢复。`);
  }).catch(() => {
    // Fallback: show in prompt
    prompt('复制以下内容到另一台设备：', encoded);
  });
}

function importFromClipboard() {
  navigator.clipboard.readText().then(text => {
    applyEncodedProgress(text.trim());
  }).catch(() => {
    const text = prompt('粘贴同步数据：');
    if (text) applyEncodedProgress(text.trim());
  });
}

function applyEncodedProgress(encoded) {
  try {
    const json = decodeURIComponent(escape(atob(encoded)));
    const data = JSON.parse(json);
    if (data.v !== 2 || !data.s) throw new Error('格式不对');
    const imported = Object.keys(data.s).length;
    Object.assign(fsrsStates, data.s);
    saveFsrsStates();
    buildList(); render();
    const time = new Date(data.t).toLocaleString('zh-CN');
    alert(`导入成功！${imported} 张卡片进度已恢复。\n(导出时间: ${time})`);
  } catch(e) {
    alert('导入失败：数据格式无效。请确认粘贴了完整的同步数据。');
  }
}

// ═══════════════════════════════════════════════════════════════
// EXPORT / IMPORT (file-based)
// ═══════════════════════════════════════════════════════════════
function exportCards() {
  const data = {
    customCards,
    fsrsStates,
    reviewLog,
    schemaVersion: 2,
    exportDate: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'flashcards_backup.json'; a.click();
  URL.revokeObjectURL(url);
}

function importCards(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.customCards) {
        const existingIds = new Set(customCards.map(c => c.id));
        data.customCards.forEach(c => {
          if(!existingIds.has(c.id)) customCards.push(c);
        });
        saveCustomCards();
      }
      if(data.fsrsStates) {
        Object.assign(fsrsStates, data.fsrsStates);
        saveFsrsStates();
      }
      if(data.reviewLog) {
        reviewLog = reviewLog.concat(data.reviewLog);
        saveReviewLog();
      }
      // Support importing old v1 format
      if(data.progress && !data.fsrsStates) {
        for (const [cardId, status] of Object.entries(data.progress)) {
          if (!fsrsStates[cardId]) {
            const now = new Date();
            if (status === 'known') {
              fsrsStates[cardId] = { state: State.Review, due: now.toISOString(), stability: 21, difficulty: 5, elapsed_days: 0, scheduled_days: 21, reps: 3, lapses: 0, last_review: now.toISOString() };
            } else if (status === 'unknown') {
              fsrsStates[cardId] = { state: State.Relearning, due: now.toISOString(), stability: 0.5, difficulty: 7, elapsed_days: 0, scheduled_days: 0, reps: 1, lapses: 1, last_review: now.toISOString() };
            }
          }
        }
        saveFsrsStates();
      }
      buildNav(); buildList(); render();
      alert('导入成功！');
    } catch(err) { alert('导入失败：' + err.message); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ═══════════════════════════════════════════════════════════════
// DIFFICULTY FILTER
// ═══════════════════════════════════════════════════════════════
function toggleDiff(lv) {
  reviewMode = false;
  document.getElementById('review-banner').classList.remove('show');
  if(diffFilter === lv) { diffFilter = 0; } else { diffFilter = lv; }
  [1,2,3].forEach(l => document.getElementById('diff-'+l).classList.toggle('active', diffFilter === l));
  document.getElementById('mode-review').classList.remove('active');
  buildList(); render();
}

// ═══════════════════════════════════════════════════════════════
// REVIEW SESSION (FSRS-driven)
// ═══════════════════════════════════════════════════════════════
function startReviewSession() {
  reviewMode = !reviewMode;
  document.getElementById('mode-review').classList.toggle('active', reviewMode);
  document.getElementById('review-banner').classList.toggle('show', reviewMode);
  diffFilter = 0;
  [1,2,3].forEach(l => document.getElementById('diff-'+l).classList.remove('active'));

  if(!reviewMode) { buildList(); render(); return; }

  const all = getAllCards();
  const { due, newCards } = getDueCards(all, fsrsStates, new Date());

  // Build review list: due cards first, then up to 10 new cards
  const maxNew = 10;
  const newToStudy = newCards.slice(0, maxNew);
  let reviewList = [...due, ...newToStudy];

  displayList = reviewList.map(c => c.id);
  curIdx = 0;

  document.getElementById('review-due').textContent = due.length;
  document.getElementById('review-new').textContent = newToStudy.length;

  const forecast = getReviewForecast(all, fsrsStates, 7);
  document.getElementById('review-forecast').textContent = forecast.reduce((a,b) => a+b, 0);

  const today = new Date().toLocaleDateString('zh-CN');
  document.getElementById('review-title').textContent = `复习模式 — ${today}`;

  render();
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if(document.getElementById('add-modal').classList.contains('show')) {
    if(e.key === 'Escape') closeAddModal();
    return;
  }
  switch(e.key) {
    case ' ': case 'Enter': e.preventDefault(); flipCard(); break;
    case 'ArrowRight': case 'l': navigate(1); break;
    case 'ArrowLeft': case 'h': navigate(-1); break;
    case '1': rate(1); break;
    case '2': rate(2); break;
    case '3': rate(3); break;
    case '4': rate(4); break;
    case 'Escape': document.getElementById('search-input').value = ''; searchQuery = ''; buildList(); render(); break;
  }
});

// ═══════════════════════════════════════════════════════════════
// STREAK / CHECK-IN
// ═══════════════════════════════════════════════════════════════
const STREAK_KEY = 'ai_fc_streak';

function getToday() { return new Date().toISOString().slice(0, 10); }

function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_KEY) || '{}'); } catch(e) { return {}; }
}
function saveStreak(data) { localStorage.setItem(STREAK_KEY, JSON.stringify(data)); }

function checkIn() {
  const data = loadStreak();
  const today = getToday();
  if (!data.days) data.days = [];
  if (!data.days.includes(today)) {
    data.days.push(today);
    data.days.sort();
    // Keep last 90 days only
    if (data.days.length > 90) data.days = data.days.slice(-90);
    saveStreak(data);
  }
  return data;
}

function calcStreak(data) {
  if (!data.days || data.days.length === 0) return 0;
  const days = [...data.days].sort().reverse();
  const today = getToday();
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);

  // Streak must include today or yesterday
  if (days[0] !== today && days[0] !== yesterday) return 0;

  let streak = 1;
  for (let i = 0; i < days.length - 1; i++) {
    const curr = new Date(days[i]);
    const prev = new Date(days[i + 1]);
    const diff = (curr - prev) / 86400000;
    if (diff === 1) streak++;
    else break;
  }
  return streak;
}

function renderStreak() {
  const data = loadStreak();
  const streak = calcStreak(data);
  const today = getToday();
  const checked = data.days && data.days.includes(today);

  document.getElementById('streak-count').textContent = streak;
  document.getElementById('streak-icon').innerHTML = streak >= 7 ? '&#x1f525;' : streak > 0 ? '&#x2b50;' : '&#x23f3;';
  document.getElementById('streak-today-label').textContent = checked ? '今日已打卡' : '复习一张卡即可打卡';

  // Render last 7 days dots
  const dots = document.getElementById('streak-dots');
  dots.innerHTML = '';
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000).toISOString().slice(0, 10);
    const dot = document.createElement('div');
    dot.className = 'streak-dot';
    if (data.days && data.days.includes(d)) dot.classList.add('done');
    if (d === today) dot.classList.add('today');
    dot.title = d;
    dots.appendChild(dot);
  }
}

// Hook into rate() to auto check-in
const _originalRate = rate;
rate = function(rating) {
  _originalRate(rating);
  checkIn();
  renderStreak();
};

loadFsrsStates();

migrateIfNeeded();
applyTheme();

document.getElementById('lang-toggle').textContent = currentLang === 'zh' ? '日本語' : '中文';
buildList();

renderStreak();
